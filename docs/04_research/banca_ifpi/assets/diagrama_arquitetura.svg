<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-label="Diagrama de arquitetura do Zero Base">
  <rect width="1400" height="820" fill="#f8fafc"/>
  <text x="36" y="54" fill="#0f172a" font-family="Segoe UI, Arial" font-size="28" font-weight="700">Arquitetura - Zero Base</text>

  <rect x="60" y="130" width="250" height="100" rx="12" fill="#dbeafe" stroke="#60a5fa"/>
  <text x="95" y="188" fill="#1e3a8a" font-family="Segoe UI, Arial" font-size="22" font-weight="700">Usuario</text>

  <rect x="380" y="90" width="360" height="190" rx="14" fill="#dcfce7" stroke="#4ade80"/>
  <text x="410" y="128" fill="#14532d" font-family="Segoe UI, Arial" font-size="22" font-weight="700">Frontend (React + Vite)</text>
  <text x="410" y="165" fill="#166534" font-family="Segoe UI, Arial" font-size="16">- Dashboard</text>
  <text x="410" y="192" fill="#166534" font-family="Segoe UI, Arial" font-size="16">- Timer / Relatorios</text>
  <text x="410" y="219" fill="#166534" font-family="Segoe UI, Arial" font-size="16">- Mentor IA (chat)</text>

  <rect x="800" y="70" width="520" height="250" rx="14" fill="#fef9c3" stroke="#facc15"/>
  <text x="830" y="108" fill="#854d0e" font-family="Segoe UI, Arial" font-size="22" font-weight="700">Backend (Node + Express)</text>
  <text x="830" y="145" fill="#854d0e" font-family="Segoe UI, Arial" font-size="16">- Auth JWT</text>
  <text x="830" y="172" fill="#854d0e" font-family="Segoe UI, Arial" font-size="16">- Rate Limit / Circuit Breaker</text>
  <text x="830" y="199" fill="#854d0e" font-family="Segoe UI, Arial" font-size="16">- API Mentor + streaming SSE</text>
  <text x="830" y="226" fill="#854d0e" font-family="Segoe UI, Arial" font-size="16">- Telemetria de tokens</text>

  <rect x="380" y="390" width="360" height="210" rx="14" fill="#ede9fe" stroke="#a78bfa"/>
  <text x="410" y="430" fill="#5b21b6" font-family="Segoe UI, Arial" font-size="22" font-weight="700">Supabase / PostgreSQL</text>
  <text x="410" y="467" fill="#5b21b6" font-family="Segoe UI, Arial" font-size="16">- Usuarios / Auth</text>
  <text x="410" y="494" fill="#5b21b6" font-family="Segoe UI, Arial" font-size="16">- Cronograma e progresso</text>
  <text x="410" y="521" fill="#5b21b6" font-family="Segoe UI, Arial" font-size="16">- mentor_token_usage</text>

  <rect x="800" y="430" width="520" height="170" rx="14" fill="#fee2e2" stroke="#f87171"/>
  <text x="830" y="470" fill="#991b1b" font-family="Segoe UI, Arial" font-size="22" font-weight="700">LLM Provider</text>
  <text x="830" y="507" fill="#991b1b" font-family="Segoe UI, Arial" font-size="16">- OpenAI / Gemini</text>
  <text x="830" y="534" fill="#991b1b" font-family="Segoe UI, Arial" font-size="16">- Prompt com contexto do aluno</text>

  <line x1="310" y1="180" x2="380" y2="180" stroke="#334155" stroke-width="3"/>
  <polygon points="380,180 368,174 368,186" fill="#334155"/>

  <line x1="740" y1="180" x2="800" y2="180" stroke="#334155" stroke-width="3"/>
  <polygon points="800,180 788,174 788,186" fill="#334155"/>

  <line x1="560" y1="280" x2="560" y2="390" stroke="#334155" stroke-width="3"/>
  <polygon points="560,390 554,378 566,378" fill="#334155"/>

  <line x1="980" y1="320" x2="980" y2="430" stroke="#334155" stroke-width="3"/>
  <polygon points="980,430 974,418 986,418" fill="#334155"/>

  <line x1="740" y1="500" x2="800" y2="500" stroke="#334155" stroke-width="3"/>
  <polygon points="800,500 788,494 788,506" fill="#334155"/>

  <text x="60" y="760" fill="#334155" font-family="Segoe UI, Arial" font-size="16">Fluxo principal: Usuario -> Frontend -> Backend -> Supabase/LLM -> Frontend</text>
</svg>
